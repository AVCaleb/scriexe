name: Release scriexe

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Fetch public test corpora
        shell: bash
        run: |
          for attempt in 1 2 3; do
            exeg fetch && exit 0
            if [[ "$attempt" == 3 ]]; then exit 1; fi
            echo "fetch attempt $attempt failed; retrying retained downloads..."
            sleep $((attempt * 10))
          done
      - name: Test Python application
        run: python -m pytest -q

  build-native:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: darwin-arm64
            os: macos-15
          - target: darwin-x64
            os: macos-15-intel
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: linux-x64
            os: ubuntu-24.04
          - target: win32-x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - name: Install build dependencies
        run: python -m pip install -e ".[distribution]"
      - name: Fetch public core corpora
        shell: bash
        run: |
          for attempt in 1 2 3; do
            exeg fetch --only ebible --versions cuvs,asv && exit 0
            if [[ "$attempt" == 3 ]]; then exit 1; fi
            echo "core fetch attempt $attempt failed; retrying retained downloads..."
            sleep $((attempt * 10))
          done
      - name: Stage core data
        run: python packaging/build_core_data.py --output build/core
      - name: Build standalone application
        run: pyinstaller --clean --noconfirm packaging/scriexe.spec
      - name: Smoke test frozen executable
        shell: bash
        run: |
          EXE="dist/scriexe/scriexe"
          if [[ "${{ runner.os }}" == "Windows" ]]; then EXE="$EXE.exe"; fi
          "$EXE" --version
          EXEG_USER_ROOT="$RUNNER_TEMP/scriexe-user" "$EXE" passage "Jude 1:1" --versions cuvs,asv >/dev/null
      - name: Prepare native npm package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python packaging/prepare_native_package.py \
            --target "${{ matrix.target }}" --dist dist/scriexe \
            --output "build/npm/${{ matrix.target }}" --version "$VERSION"
          cd "build/npm/${{ matrix.target }}"
          npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.target }}
          path: build/npm/${{ matrix.target }}/*.tgz

  publish:
    needs: build-native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: build/native-packages
          merge-multiple: true
      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for package in build/native-packages/*.tgz; do
            spec=$(tar -xOf "$package" package/package.json | \
              node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{const p=JSON.parse(s); console.log(`${p.name}@${p.version}`)})')
            if npm view "$spec" version >/dev/null 2>&1; then
              echo "$spec already published; skipping"
            else
              npm publish "$package" --access public --provenance
            fi
          done
      - name: Test and publish main launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node --test npm/scriexe/test/*.test.js
          node - "$VERSION" <<'NODE'
          const fs = require('node:fs');
          const file = 'npm/scriexe/package.json';
          const version = process.argv[2];
          const pkg = JSON.parse(fs.readFileSync(file));
          pkg.version = version;
          for (const name of Object.keys(pkg.optionalDependencies)) pkg.optionalDependencies[name] = version;
          fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
          NODE
          cp README.md npm/scriexe/README.md
          cp README_ZH.md npm/scriexe/README_ZH.md
          cd npm/scriexe
          npm publish --access public --provenance
